<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WhiteCore Auth</title>

    <link rel="stylesheet" href="auth.css">
</head>


<body>


<div class="auth-box">


    <img src="assets/logo.png" class="logo">


    <h1 id="title">
        Login
    </h1>



    <div class="form">


        <input 
        id="email"
        type="email"
        placeholder="Email">


        <input 
        id="password"
        type="password"
        placeholder="Password">



        <button id="authBtn">
            LOGIN
        </button>


    </div>



    <p id="message"></p>


    <div class="switch">

        <span id="switchText">
            Nincs fiókod?
        </span>

        <button id="switchBtn">
            Register
        </button>

    </div>



</div>



<script type="module" src="auth.js"></script>

</body>
</html>
